# Вариант A — Nginx для subscription endpoint и decoy-сайта
# Xray занимает :443, Nginx слушает на произвольном порту (здесь 8080)
# Порт 8080 можно изменить на любой другой (3000, 7000, и т.д.)

server {
    listen 8080;          # ← меняйте на любой порт по желанию
    listen [::]:8080;     # IPv6, удалить если не нужно
    server_name _;

    root /var/www/html;
    index index.html;

    # Subscription endpoint
    location /sub {
        alias /var/www/sub/;
        default_type text/plain;
        autoindex off;
    }

    # Decoy page
    location / {
        try_files $uri $uri/ =404;
    }
}
