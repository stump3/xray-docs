# Вариант D — Nginx: decoy-сайт + HTTP→HTTPS redirect
# Nginx слушает :80 (redirect) и :8080 (decoy, только localhost)
# Xray терминирует TLS на :443 и отправляет нераспознанный трафик на :8080

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # ← заменить
    return 301 https://$host$request_uri;
}

# Decoy сайт — только localhost, снаружи напрямую недоступен
server {
    listen 127.0.0.1:8080;        # ← порт должен совпадать с fallbacks[].dest в Xray
    server_name your-domain.com;  # ← заменить

    root /var/www/html;
    index index.html;

    # HSTS — выглядит как настоящий продакшн-сайт
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Subscription endpoint (опционально)
    location /sub {
        alias /var/www/sub/;
        default_type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
